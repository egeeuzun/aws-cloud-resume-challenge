<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title data-i18n-title="404.meta.title">404 — Sayfa Bulunamadı</title>
  <link rel="icon" type="image/png" href="/favicon.png" />

  <script>
    (function () {
      var t = localStorage.getItem('theme');
      if (!t) t = window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>

  <link rel="stylesheet" href="styles.css" />
  <script defer src="i18n.js"></script>
</head>
<body>

  <div class="container">
    <header>
      <a class="brand" href="/">Ege Uzun</a>

      <button class="nav-toggle" id="navToggle" aria-label="Menüyü aç/kapat" data-i18n-aria="aria.navToggle" type="button">
        <svg class="icon-hamburger" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/></svg>
        <svg class="icon-close" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>

      <nav class="nav" id="main-nav">
        <a href="/" data-i18n="nav.home">Ana Sayfa</a>
        <a href="/#projeler" data-i18n="nav.projects">Projeler</a>
        <a href="/assets/cv.pdf" target="_blank" data-i18n="nav.cv">CV</a>
        <a href="/#iletisim" data-i18n="nav.contact">İletişim</a>

        <button id="langToggle" class="lang-toggle" aria-label="Switch to English" type="button">
          <span class="flag-tr">TR</span>
          <span class="flag-en">EN</span>
        </button>

        <button id="themeToggle" class="theme-toggle" aria-label="Tema değiştir" data-i18n-aria="aria.themeToggle" type="button">
          <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <circle cx="12" cy="12" r="5" /><line x1="12" y1="1" x2="12" y2="3" /><line x1="12" y1="21" x2="12" y2="23" /><line x1="4.22" y1="4.22" x2="5.64" y2="5.64" /><line x1="18.36" y1="18.36" x2="19.78" y2="19.78" /><line x1="1" y1="12" x2="3" y2="12" /><line x1="21" y1="12" x2="23" y2="12" /><line x1="4.22" y1="19.78" x2="5.64" y2="18.36" /><line x1="18.36" y1="5.64" x2="19.78" y2="4.22" />
          </svg>
          <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z" />
          </svg>
        </button>
      </nav>
    </header>

    <main>
      <div class="error-page">
        <h1 data-i18n="404.title">404</h1>
        <p data-i18n="404.desc">Aradığınız sayfa taşınmış, silinmiş ya da hiç var olmamış olabilir.</p>
        <div class="error-actions">
          <a href="/" class="btn btn-primary" data-i18n="404.home">Ana sayfaya dön</a>
          <a href="#" onclick="history.back();return false;" class="btn btn-secondary" data-i18n="404.back">Geri dön</a>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer-left">
        <span>&copy; <script>document.write(new Date().getFullYear())</script> Ege Uzun</span>
      </div>
      <div class="footer-nav">
        <a href="/" data-i18n="footer.home">Ana Sayfa</a>
        <a href="/#projeler" data-i18n="footer.projects">Projeler</a>
        <a href="/#iletisim" data-i18n="footer.contact">İletişim</a>
      </div>
    </footer>
  </div>

  <script>
    // Theme toggle
    var toggle = document.getElementById('themeToggle');
    if (toggle) {
      toggle.addEventListener('click', function () {
        var current = document.documentElement.getAttribute('data-theme') || 'dark';
        var next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
      });
    }
    // Nav toggle
    var navBtn = document.getElementById('navToggle');
    var nav = document.getElementById('main-nav');
    if (navBtn && nav) {
      navBtn.addEventListener('click', function () {
        navBtn.classList.toggle('open');
        nav.classList.toggle('open');
      });
      nav.querySelectorAll('a').forEach(function (link) {
        link.addEventListener('click', function () {
          navBtn.classList.remove('open');
          nav.classList.remove('open');
        });
      });
    }
  </script>
</body>
</html>
